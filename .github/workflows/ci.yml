name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: 运行测试 + 覆盖率
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: 运行测试
        run: |
          pytest tests/ -v --cov=agent --cov=services --cov=llm --cov-report=xml --cov-report=term-missing

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: 代码规范检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 ruff
        run: pip install ruff

      - name: 代码检查
        run: ruff check .

      - name: 格式检查
        run: ruff format --check .

  docker-build:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: |
          docker build -t movie-rec-agent:${{ github.sha }} .
          docker tag movie-rec-agent:${{ github.sha }} movie-rec-agent:latest

      - name: 验证镜像
        run: |
          docker run --rm movie-rec-agent:latest --help || true
